<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--This is to help auto scale the page to the device usedS-->
    <title>Inspection – {{ device.name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .topbar {
            background: #1d889b;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar a { color: white; text-decoration: none; font-size: 20px; }
        .topbar h1 { font-size: 17px; font-weight: 600; }
        .topbar .sub { font-size: 13px; opacity: 0.85; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .section-heading {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #1d889b;
            margin: 24px 16px 8px;
        }

        .field { margin-bottom: 18px; }
        .field:last-child { margin-bottom: 0; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            color: #222;
            appearance: none;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none;
            border-color: #1d889b;
            background: white;
        }
        .required { color: #e05; }

        /* ── Checklist item card ── */
        .checklist-item {
            background: white;
            border-radius: 12px;
            padding: 18px 20px;
            margin: 0 16px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .sub-label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        /* ── Day toggles ── */
        .day-toggles {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .day-btn {
            flex: 1;
            min-width: 34px;
            padding: 9px 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            text-align: center;
        }
        .day-btn.selected {
            background: #1d889b;
            border-color: #1d889b;
            color: white;
        }

        /* ── Yes/No buttons ── */
        .yn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }
        .yn-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
        }
        .yn-btn.selected-yes {
            background: #e6f6f0;
            border-color: #27ae60;
            color: #27ae60;
        }
        .yn-btn.selected-no {
            background: #fef0f0;
            border-color: #e05;
            color: #e05;
        }

        /* ── Repair sub-fields ── */
        .repair-fields {
            background: #fff8f0;
            border: 1.5px solid #f0c080;
            border-radius: 10px;
            padding: 14px;
            margin-top: 4px;
        }
        .repair-fields .field { margin-bottom: 12px; }
        .repair-fields .field:last-child { margin-bottom: 0; }

        /* ── Summary ── */
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-item-name { font-size: 14px; color: #333; flex: 1; line-height: 1.3; }
        .summary-days { font-size: 12px; color: #999; margin-top: 2px; }
        .repair-tag {
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            background: #fef0f0; color: #e05;
            white-space: nowrap;
        }
        .ok-tag {
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            background: #e6f6f0; color: #27ae60;
            white-space: nowrap;
        }
        .skip-tag {
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            background: #f0f0f0; color: #999;
            white-space: nowrap;
        }
        .summary-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #1d889b;
            margin-bottom: 4px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid #e6f6f8;
        }
        .summary-section { margin-bottom: 20px; }
        .summary-section:last-child { margin-bottom: 0; }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #1d889b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary:active { background: #166e7e; }
    </style>
</head>
<body>
<!-- Here the body (the actual functioning of the app begins :)-->
<div class="topbar">
    <a href="{{ url_for('device_page', device_id=device_id) }}">←</a>
    <div>
        <div class="sub">Inspection</div>
        <h1>{{ device.name }}</h1>
    </div>
</div>

<!-- ── Header fields ── -->
<div class="card" style="margin-top:16px;">
    <div class="field">
        <label>Company <span class="required">*</span></label>
        <input type="text" id="company" placeholder="Company name" />
    </div>
    <div class="field">
        <label>Project <span class="required">*</span></label>
        <input type="text" id="project" placeholder="Project name" />
    </div>
    <div class="field">
        <label>Equipment # <span class="required">*</span></label>
        <input type="text" id="equipment_num" value="{{ device.id }}" />
    </div>
    <div class="field">
        <label>Category <span class="required">*</span></label>
        <select id="category" onchange="toggleOther()">
            <option value="">— Choose one —</option>
            <option>Forklift</option>
            <option>Broderson</option>
            <option>Sweeper</option>
            <option>Elevated Work Platform</option>
            <option>Other</option>
        </select>
    </div>
    <div class="field" id="other-field" style="display:none;">
        <label>If other, please specify</label>
        <input type="text" id="if_other" placeholder="Describe equipment" />
    </div>
    <div class="field">
        <label>Model # <span class="required">*</span></label>
        <input type="text" id="model_num" value="{{ device.model }}" />
    </div>
    <div class="field">
        <label>Operator's Name <span class="required">*</span></label>
        <input type="text" id="operator" placeholder="Full name" />
    </div>
    <div class="field">
        <label>Initials <span class="required">*</span></label>
        <input type="text" id="initials" placeholder="e.g. JD" />
    </div>
</div>

<!-- ── Checklist ── -->
<div id="checklist-container"></div>

<!-- ── Summary ── -->
<div class="section-heading">Summary</div>
<div class="card" id="summary-card">
    <p style="color:#aaa; font-size:14px;">Fill in the checklist above to see the summary.</p>
</div>

<div style="margin: 0 16px 16px;">
    <button class="btn-primary" onclick="submitInspection(false)">Submit Inspection</button>
</div>

<div style="margin: 0 16px 16px;">
    <button class="btn-primary" onclick="submitInspection(true)">Submit Annual Inspection</button>
</div>

<script>
const CHECKLIST = [
    { section: "Pre-Start Check", item: "Fuel Level / Oil Level" },
    { section: "Pre-Start Check", item: "Fluid Levels" },
    { section: "Pre-Start Check", item: "Fuel Lines / Connections / Status (EWP)" },
    { section: "Pre-Start Check", item: "Loose Bolts, Clips, etc." },
    { section: "Pre-Start Check", item: "Wheels and Tires" },
    { section: "Pre-Start Check", item: "Forks - move freely, defects (Forklift)" },
    { section: "Pre-Start Check", item: "Hoses Secure, Fluid Leaks" },
    { section: "Pre-Start Check", item: "Horn, Lights, Backup Alarm" },
    { section: "Pre-Start Check", item: "Operational" },
    { section: "Pre-Start Check", item: "Cable Check (Broderson)" },
    { section: "Pre-Start Check", item: "Cracks in Scissor Boom (EWP)" },
    { section: "Pre-Start Check", item: "Operator's Manual" },
    { section: "Pre-Start Check", item: "Seat Belts" },
    { section: "Pre-Start Check", item: "Fire Extinguisher" },
    { section: "Operation Pre-Use Check", item: "Foot Brake Operational" },
    { section: "Operation Pre-Use Check", item: "Parking Brake Operational" },
    { section: "Operation Pre-Use Check", item: "Clutch / Gear Shift Operational" },
    { section: "Operation Pre-Use Check", item: "Steering Operational" },
    { section: "Operation Pre-Use Check", item: "Boom / Mast Operational - Test thru full hoist and full tilt" },
    { section: "Operation Pre-Use Check", item: "Boom / Outrigger Operational" },
    { section: "Platform Inspection Checked for EWP", item: "Handrails, Safety Chains, Bars" },
    { section: "Platform Inspection Checked for EWP", item: "Clean & Free of Obstructions" },
    { section: "Controls - Check All 1", item: "Functions & Indicators - must be legible" },
    { section: "Controls - Check All 1", item: "Motion Warning Devices" },
    { section: "Controls - Check All 1", item: "Documentation & Handbook" },
    { section: "Controls - Check All 2", item: "Alarm / Warning Devices / Lights" },
    { section: "Controls - Check All 2", item: "Oil Leaks" },
    { section: "Controls - Check All 2", item: "Lift Cylinder Condition" },
    { section: "Controls - Check All 2", item: "Hydraulic Fluid Level" },
    { section: "Controls - Check All 2", item: "Emergency Lowering Valve" },
    { section: "Controls - Check All 2", item: "Battery Fluid Level" },
    { section: "Controls - Check All 2", item: "Battery Cables" },
    { section: "Controls - Check All 2", item: "Visual Check of Battery Casing" }
];

// ── Build checklist DOM ──
function buildChecklist() {
    const container = document.getElementById('checklist-container');
    let currentSection = null;

    CHECKLIST.forEach((entry, i) => {
        if (entry.section !== currentSection) {
            currentSection = entry.section;
            const heading = document.createElement('div');
            heading.className = 'section-heading';
            heading.textContent = currentSection;
            container.appendChild(heading);
        }

        const card = document.createElement('div');
        card.className = 'checklist-item';
        card.innerHTML = `
            <div class="item-title">${entry.item}</div>

            <div class="sub-label">Days checked</div>
            <div class="day-toggles">
                ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d =>
                    `<button class="day-btn" onclick="toggleDay(this)">${d}</button>`
                ).join('')}
            </div>

            <div class="sub-label">Needs repair?</div>
            <div class="yn-group">
                <button class="yn-btn" onclick="setRepair(this, 'Yes', ${i})">Yes</button>
                <button class="yn-btn" onclick="setRepair(this, 'No', ${i})">No</button>
            </div>

            <div class="repair-fields" id="repair-${i}" style="display:none;">
                <div class="field">
                    <label>Reported to supervisor?</label>
                    <select id="reported-${i}">
                        <option value="">— Choose —</option>
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>
                <div class="field">
                    <label>Supervisor initials</label>
                    <input type="text" id="sup-initials-${i}" placeholder="e.g. AB" />
                </div>
                <div class="field">
                    <label>Deficiency corrected sign-off</label>
                    <input type="text" id="corrected-${i}" placeholder="Attach proof or note" />
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function toggleDay(btn) {
    btn.classList.toggle('selected');
    refreshSummary();
}

function setRepair(btn, val, index) {
    const group = btn.parentElement;
    group.querySelectorAll('.yn-btn').forEach(b => b.className = 'yn-btn');
    btn.className = 'yn-btn ' + (val === 'Yes' ? 'selected-yes' : 'selected-no');
    document.getElementById('repair-' + index).style.display = val === 'Yes' ? 'block' : 'none';
    refreshSummary();
}

// ── Read current state ──
function readChecklist() {
    return CHECKLIST.map((entry, i) => {
        const card = document.querySelectorAll('.checklist-item')[i];
        const days = [...card.querySelectorAll('.day-btn.selected')].map(b => b.textContent);
        const yesBtn = card.querySelectorAll('.yn-btn')[0];
        const noBtn = card.querySelectorAll('.yn-btn')[1];
        const needs_repair = yesBtn.classList.contains('selected-yes') ? 'Yes'
                           : noBtn.classList.contains('selected-no') ? 'No' : '';
        return {
            section: entry.section,
            item: entry.item,
            days_checked: days,
            needs_repair,
            reported: (document.getElementById('reported-' + i) || {value:''}).value,
            sup_initials: (document.getElementById('sup-initials-' + i) || {value:''}).value.trim(),
            corrected_signoff: (document.getElementById('corrected-' + i) || {value:''}).value.trim()
        };
    });
}

// ── Live summary ──
function refreshSummary() {
    const data = readChecklist();
    const sections = [...new Set(CHECKLIST.map(c => c.section))];
    let html = '';
    sections.forEach(section => {
        const items = data.filter(d => d.section === section);
        html += `<div class="summary-section">
            <div class="summary-section-title">${section}</div>`;
        items.forEach(a => {
            const daysStr = a.days_checked.length ? a.days_checked.join(', ') : '—';
            const tag = a.needs_repair === 'Yes' ? '<span class="repair-tag">Repair needed</span>'
                      : a.needs_repair === 'No'  ? '<span class="ok-tag">OK</span>'
                      : '<span class="skip-tag">—</span>';
            html += `<div class="summary-row">
                <div>
                    <div class="summary-item-name">${a.item}</div>
                    <div class="summary-days">${daysStr}</div>
                </div>
                ${tag}
            </div>`;
        });
        html += `</div>`;
    });
    document.getElementById('summary-card').innerHTML = html;
}

// ── Submit ──
function toggleOther() {
    const cat = document.getElementById('category').value;
    document.getElementById('other-field').style.display = cat === 'Other' ? 'block' : 'none';
}

function submitInspection(annual) {
    const company = document.getElementById('company').value.trim();
    const project = document.getElementById('project').value.trim();
    const equipment_num = document.getElementById('equipment_num').value.trim();
    const category = document.getElementById('category').value;
    const model_num = document.getElementById('model_num').value.trim();
    const operator = document.getElementById('operator').value.trim();
    const initials = document.getElementById('initials').value.trim();

    if (!company || !project || !equipment_num || !category || !model_num || !operator || !initials) {
        alert("Please fill in all required fields at the top.");
        return;
    }

    const payload = {
        company, project, equipment_num, category,
        if_other: document.getElementById('if_other').value.trim(),
        model_num, operator, initials, annual,
        checklist: readChecklist()
    };

    fetch(window.location.pathname, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    }).then(response => {
        if (response.ok) {
            alert("Inspection submitted successfully.");
            window.location.href = "{{ url_for('device_page', device_id=device_id) }}";
        } else {
            alert("Something went wrong. Please try again.");
        }
    });
}

buildChecklist();
</script>
</body>
</html>
